services:
  # SSH tarpit. Accepts connections and drip-feeds a fake banner at 1 byte/sec.
  # Note: read_only not compatible with linuxserver/s6-overlay images.
  # Hardening: cap_drop ALL, no-new-privileges, tmpfs for /tmp and /config.
  endlessh:
    image: lscr.io/linuxserver/endlessh:version-dfe44eb2
    container_name: trap-endlessh
    ports:
      - "${ENDLESSH_PORT:-22222}:2222"
    networks:
      - trap-external
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,nodev
      - /config:noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # SSH/Telnet honeypot. Accepts credentials, provides fake shell, logs JSON.
  cowrie:
    image: cowrie/cowrie:sha-a2887ca
    container_name: trap-cowrie
    ports:
      - "${COWRIE_SSH_PORT:-2222}:2222"
      - "${COWRIE_TELNET_PORT:-2223}:2223"
    networks:
      - trap-external
    volumes:
      - ./data/logs/cowrie:/var/log/trap-house
      - ./services/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./services/cowrie/honeyfs:/cowrie/cowrie-git/honeyfs:ro
      - cowrie-var:/cowrie/cowrie-git/var
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Deception middleware. FastAPI fake corporate web app with maze logic.
  deception-gw:
    build: ./services/deception-gw
    container_name: trap-deception-gw
    ports:
      - "${DECEPTION_PORT:-8080}:8000"
    networks:
      - trap-external
    volumes:
      - ./data/logs/deception-gw:/var/log/trap-house
    environment:
      - ENABLE_CANARYTOKENS=${ENABLE_CANARYTOKENS:-false}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-secret-key}
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Log shipper. Reads Cowrie JSON logs and Endlessh stdout (via docker logs),
  # normalizes to shared event schema, writes to SQLite.
  log-shipper:
    build:
      context: ./services/log-shipper
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    container_name: trap-log-shipper
    networks:
      - trap-internal
    volumes:
      # Read Cowrie JSON logs from bind mount
      - ./data/logs/cowrie:/var/log/trap-house/cowrie:ro
      # Read deception-gw JSON logs from bind mount
      - ./data/logs/deception-gw:/var/log/trap-house/deception-gw:ro
      # SQLite database persisted on host
      - ./data/db:/data/db
      # Docker socket for reading endlessh container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ENDLESSH_CONTAINER=trap-endlessh
      - DB_PATH=/data/db/trap-house.db
      - LOG_DIR=/var/log/trap-house
      - POLL_INTERVAL=2
      - LOKI_URL=http://loki:3100/loki/api/v1/push
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # MITRE mapper. Reads events from SQLite, maps to ATT&CK techniques,
  # builds attacker profiles with risk scoring.
  mitre-mapper:
    build: ./services/mitre-mapper
    container_name: trap-mitre-mapper
    networks:
      - trap-internal
    volumes:
      - ./data/db:/data/db
      - ./config:/config:ro
    environment:
      - DB_PATH=/data/db/trap-house.db
      - TECHNIQUES_FILE=/config/mitre-techniques.yaml
      - POLL_INTERVAL=5
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Threat intelligence frontend. Custom FastAPI dashboard with Leaflet map,
  # MITRE heatmap, session replay, and event timeline.
  frontend:
    build: ./services/frontend
    container_name: trap-frontend
    ports:
      - "${FRONTEND_PORT:-8001}:8001"
    networks:
      - trap-external
      - trap-internal
    volumes:
      - ./data/db:/data/db:ro
    environment:
      - DB_PATH=/data/db/trap-house.db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Loki log aggregation. Receives structured logs from log-shipper.
  loki:
    image: grafana/loki:3.4.2
    container_name: trap-loki
    networks:
      - trap-internal
    volumes:
      - ./data/loki:/loki
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Grafana dashboard for log-based metrics. Internal only.
  grafana:
    image: grafana/grafana:11.5.2
    container_name: trap-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - trap-internal
      - trap-external  # Dev access via host port. Prod: SSH tunnel only.
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  cowrie-var:
    driver: local

networks:
  trap-external:
    driver: bridge
  trap-internal:
    driver: bridge
    internal: true