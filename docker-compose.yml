services:
  # SSH tarpit. Accepts connections and drip-feeds a fake banner at 1 byte/sec.
  # Note: read_only not compatible with linuxserver/s6-overlay images.
  # Hardening: cap_drop ALL, no-new-privileges, tmpfs for /tmp and /config.
  endlessh:
    image: lscr.io/linuxserver/endlessh:version-dfe44eb2
    container_name: trap-endlessh
    ports:
      - "${ENDLESSH_PORT:-22222}:2222"
    networks:
      - trap-external
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,nodev
      - /config:noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # SSH/Telnet honeypot. Accepts credentials, provides fake shell, logs JSON.
  cowrie:
    image: cowrie/cowrie:sha-a2887ca
    container_name: trap-cowrie
    ports:
      - "${COWRIE_SSH_PORT:-2222}:2222"
      - "${COWRIE_TELNET_PORT:-2223}:2223"
    networks:
      - trap-external
    volumes:
      - ./data/logs/cowrie:/var/log/trap-house
      - ./services/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./services/cowrie/honeyfs:/cowrie/cowrie-git/honeyfs:ro
      - cowrie-var:/cowrie/cowrie-git/var
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Deception middleware. FastAPI fake corporate web app with maze logic.
  deception-gw:
    build: ./services/deception-gw
    container_name: trap-deception-gw
    ports:
      - "${DECEPTION_PORT:-8080}:8000"
    networks:
      - trap-external
    volumes:
      - ./data/logs/deception-gw:/var/log/trap-house
    environment:
      - ENABLE_CANARYTOKENS=${ENABLE_CANARYTOKENS:-false}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-secret-key}
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # Log shipper. Reads Cowrie JSON logs and Endlessh stdout (via docker logs),
  # normalizes to shared event schema, writes to SQLite.
  log-shipper:
    build: ./services/log-shipper
    container_name: trap-log-shipper
    networks:
      - trap-internal
    volumes:
      # Read Cowrie JSON logs from bind mount
      - ./data/logs/cowrie:/var/log/trap-house/cowrie:ro
      # Read deception-gw JSON logs from bind mount
      - ./data/logs/deception-gw:/var/log/trap-house/deception-gw:ro
      # SQLite database persisted on host
      - ./data/db:/data/db
      # Docker socket for reading endlessh container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ENDLESSH_CONTAINER=trap-endlessh
      - DB_PATH=/data/db/trap-house.db
      - LOG_DIR=/var/log/trap-house
      - POLL_INTERVAL=2
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  cowrie-var:
    driver: local

networks:
  trap-external:
    driver: bridge
  trap-internal:
    driver: bridge
    internal: true