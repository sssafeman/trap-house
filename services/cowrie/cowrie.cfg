# Trap House cowrie overrides.
# Cowrie reads its packaged cowrie.cfg.dist first, then this file, so only the
# values that differ from the defaults are listed here.

[honeypot]
# Believable hostname for the fake corporate file server.
hostname = corp-fileserver-01
# Write all cowrie logs (text and JSON) to the shared trap-logs volume.
log_path = /var/log/trap-house

[output_jsonlog]
# JSON event log consumed by the log-shipper in a later phase.
enabled = true
logfile = /var/log/trap-house/cowrie.json
epoch_timestamp = false

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
# Disabled by default in cowrie. Phase 1a maps the telnet port, so enable it.
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0
