<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ company }}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f8; color: #1a2330;
    }
    header.nt-top {
      background: #0b3d63; color: #fff; padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nt-brand { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .nt-brand span { color: #1d9bd1; }
    nav.nt-nav a { color: #d7e6f0; margin-left: 18px; text-decoration: none; font-size: 14px; }
    nav.nt-nav a:hover { color: #fff; }
    main.nt-main { max-width: 980px; margin: 28px auto; padding: 0 20px; }
    .nt-card {
      background: #fff; border: 1px solid #dde4ea; border-radius: 6px;
      padding: 22px 26px; margin-bottom: 22px;
    }
    h1, h2 { color: #0b3d63; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #e6ebf0; font-size: 14px; }
    input[type=text], input[type=password], input[type=search] {
      width: 100%; padding: 10px; border: 1px solid #c4ccd4; border-radius: 4px; font-size: 14px;
    }
    button, input[type=submit] {
      background: #1d9bd1; color: #fff; border: 0; padding: 10px 18px;
      border-radius: 4px; font-size: 14px; cursor: pointer;
    }
    pre.nt-term {
      background: #0c1118; color: #b9f5c8; padding: 14px; border-radius: 4px;
      overflow-x: auto; font-size: 13px; white-space: pre-wrap;
    }
    .nt-hint { color: #7a8693; font-size: 12px; }
    footer.nt-foot { text-align: center; color: #9aa6b2; font-size: 12px; padding: 24px; }
  </style>
</head>
<body>
  <header class="nt-top">
    <div class="nt-brand">Nord<span>Tech</span> Solutions</div>
    <nav class="nt-nav">
      <a href="/dashboard">Dashboard</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/files">Files</a>
      <a href="/admin/config">Config</a>
      <a href="/admin/backup">Backup</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>
  <main class="nt-main">
    {% block content %}{% endblock %}
  </main>
  <footer class="nt-foot">
    {{ company }} internal portal. Authorized personnel only. Build 4.2.1
  </footer>
</body>
</html>
