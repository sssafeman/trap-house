<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in - {{ company }}</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #0b3d63; color: #1a2330; }
    .nt-login-wrap { max-width: 380px; margin: 8vh auto; }
    .nt-login-card { background: #fff; border-radius: 8px; padding: 32px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    .nt-brand { text-align: center; font-size: 24px; font-weight: 700; color: #0b3d63; margin-bottom: 4px; }
    .nt-brand span { color: #1d9bd1; }
    .nt-sub { text-align: center; color: #7a8693; font-size: 13px; margin-bottom: 22px; }
    label { display: block; font-size: 13px; color: #44525f; margin: 12px 0 5px; }
    input { width: 100%; padding: 11px; border: 1px solid #c4ccd4; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; margin-top: 20px; background: #1d9bd1; color: #fff; border: 0; padding: 12px; border-radius: 4px; font-size: 15px; cursor: pointer; }
    .nt-err { background: #fdecec; color: #b3261e; border: 1px solid #f5c2c0; padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; }
    .nt-foot { text-align: center; color: #cfdbe6; font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="nt-login-wrap">
    <div class="nt-login-card">
      <div class="nt-brand">Nord<span>Tech</span> Solutions</div>
      <div class="nt-sub">Corporate Resource Portal</div>
      {% if error %}<div class="nt-err">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="off" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="off" required>
        <button type="submit">Sign in</button>
      </form>
    </div>
    <div class="nt-foot">{{ company }}. Internal use only.</div>
  </div>
</body>
</html>
