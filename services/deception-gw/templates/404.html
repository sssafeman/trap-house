<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found - {{ company }}</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f4f6f8; color: #1a2330; }
    .nt-404 { max-width: 520px; margin: 14vh auto; text-align: center; }
    .nt-code { font-size: 64px; font-weight: 700; color: #0b3d63; }
    .nt-msg { color: #7a8693; font-size: 15px; margin: 10px 0 22px; }
    a { color: #1d9bd1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="nt-404">
    <div class="nt-code">404</div>
    <div class="nt-msg">The requested resource was not found on this server.</div>
    <a href="/dashboard">Return to dashboard</a>
  </div>
</body>
</html>
